$def with(cliente)

<form method="post">
    <label for="id_cliente">ID:</label>
    <input type="text" id="id_cliente" name="id_cliente" value="$cliente['id_cliente']" readonly><br><br>

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" value="$cliente['nombre']" readonly><br><br>

    <label for="primer_apellido">Primer Apellido:</label>
    <input type="text" id="primer_apellido" name="primer_apellido" value="$cliente['primer_apellido']" readonly><br><br>

    <label for="segundo_apellido">Segundo Apellido:</label>
    <input type="text" id="segundo_apellido" name="segundo_apellido" value="$cliente['segundo_apellido']" readonly><br><br>

    <label for="telefono">Telefono:</label>
    <input type="text" id="telefono" name="telefono" value="$cliente['telefono']" readonly><br><br>

    <a href="/lista_clientes"><button type="button">Regresar</button></a>
</form>
