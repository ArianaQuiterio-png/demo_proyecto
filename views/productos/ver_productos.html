$def with(productos)

<h2>Lista de Productos</h2>

<a href="/insertar_producto">
    <button>Nuevo Producto</button>
</a>

<br><br>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Stock</th>
        <th>Descripción</th>
        <th>Precio</th>
        <th>Acciones</th>
    </tr>

    $for producto in productos:
        <tr>
            <td>$producto.id_producto</td>
            <td>$producto.nombre</td>
            <td>$producto.stock</td>
            <td>$producto.descripcion</td>
            <td>$producto.precio</td>
            <td>
                <a href="/editar_producto/$producto.id_producto">
                    <button>Editar</button>
                </a>

                <a href="/borrar_producto/$producto.id_producto">
                    <button>Borrar</button>
                </a>
            </td>
        </tr>

</table>
